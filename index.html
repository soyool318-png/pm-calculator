<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>습도 보정 미세먼지 계산기</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="container">

   <h1>🌫️ 습도 보정 미세먼지 계산기</h1>



    <div class="input-box">

        <label>
    간이 습도 (%)
        </label>

        <input
            type="number"
            id="humidity"
            placeholder="예 : 80"
        >

    </div>



    <div class="input-box">

        <label>
            간이 미세먼지 농도 (㎍/m³)
        </label>

        <input
            type="number"
            id="pm"
            step="0.1"
            placeholder="예 : 35.5"
        >

    </div>



    <button onclick="calculate()">
        계산하기
    </button>



    <div id="result" class="result hidden">

    </div>


</div>



<script src="script.js"></script>


</body>

</html>
