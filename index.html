<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>습도 보정 미세먼지 계산기</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="container">

    <h1>🌫️ 습도 보정 미세먼지 계산기</h1>


    <p class="subtitle">
        간이 미세먼지 센서는 습도가 높을 때
        입자를 크게 측정하는 오차가 발생할 수 있습니다.<br><br>

        직접 측정한 습도와 미세먼지 데이터를 기반으로
        습도 영향을 보정하여 예상 실제 농도를 계산합니다.
    </p>



    <div class="input-box">

        <label>
            습도 (%)
        </label>

        <input
            type="number"
            id="humidity"
            placeholder="예 : 80"
        >

    </div>



    <div class="input-box">

        <label>
            간이 미세먼지 농도 (㎍/m³)
        </label>

        <input
            type="number"
            id="pm"
            step="0.1"
            placeholder="예 : 35.5"
        >

    </div>



    <button onclick="calculate()">
        계산하기
    </button>



    <div id="result" class="result hidden">

    </div>


</div>



<script src="script.js"></script>


</body>

</html>
